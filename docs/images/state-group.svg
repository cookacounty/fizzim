<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" role="img" aria-label="Modern state group diagram">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef6f2"/>
    </linearGradient>
    <linearGradient id="groupFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9fbf8"/>
      <stop offset="1" stop-color="#fff6d8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#24313d"/>
    </marker>
    <filter id="shadow" x="-15%" y="-25%" width="130%" height="155%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#12202a" flood-opacity="0.16"/>
    </filter>
    <style>
      text { font-family: Inter, Segoe UI, Arial, Helvetica, sans-serif; fill: #17212b; }
      .bg { fill: #f4f7f9; }
      .group { fill: url(#groupFill); stroke: #2bb3a3; stroke-width: 3; }
      .state { fill: url(#card); stroke: #24313d; stroke-width: 2.4; filter: url(#shadow); }
      .line { fill: none; stroke: #24313d; stroke-width: 3; marker-end: url(#arrow); }
      .name { font-size: 17px; font-weight: 800; text-anchor: middle; dominant-baseline: middle; }
      .groupName { fill: #14786f; font-size: 16px; font-weight: 900; }
      .label { font-size: 15px; font-weight: 800; }
      .caption { fill: #566575; font-size: 14px; font-weight: 600; }
    </style>
  </defs>

  <rect class="bg" width="760" height="320" rx="20"/>
  <text class="caption" x="38" y="42">A rounded state group carries shared outputs and transitions</text>

  <rect class="group" x="66" y="72" width="420" height="190" rx="28"/>
  <text class="groupName" x="92" y="106">READY_GROUP</text>

  <ellipse class="state" cx="188" cy="170" rx="76" ry="46"/>
  <text class="name" x="188" y="170">RDY</text>

  <ellipse class="state" cx="366" cy="170" rx="92" ry="46"/>
  <text class="name" x="366" y="170">FUSE_RDY</text>

  <ellipse class="state" cx="632" cy="170" rx="98" ry="46"/>
  <text class="name" x="632" y="170">SHUTDOWN</text>

  <path class="line" d="M 486 170 C 512 170 528 170 534 170"/>
  <text class="label" x="500" y="148">shutdown_req</text>
</svg>
