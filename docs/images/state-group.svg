<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" role="img" aria-label="State group diagram">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111; }
      .state { fill: #fff; stroke: #222; stroke-width: 2; }
      .group { fill: none; stroke: #222; stroke-width: 2.5; }
      .line { fill: none; stroke: #222; stroke-width: 2; marker-end: url(#arrow); }
      .label { font-size: 16px; }
      .groupName { font-size: 17px; font-weight: 700; }
      .name { font-size: 17px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <rect class="group" x="70" y="44" width="390" height="212" rx="26" ry="26"/>
  <text class="groupName" x="92" y="76">READY_GROUP</text>
  <ellipse class="state" cx="180" cy="150" rx="78" ry="48"/>
  <text class="name" x="180" y="150">RDY</text>
  <ellipse class="state" cx="350" cy="150" rx="86" ry="48"/>
  <text class="name" x="350" y="150">FUSE_RDY</text>
  <ellipse class="state" cx="610" cy="150" rx="92" ry="48"/>
  <text class="name" x="610" y="150">SHUTDOWN</text>
  <path class="line" d="M 460 150 C 492 150 506 150 520 150"/>
  <text class="label" x="484" y="132">shutdown_req</text>
</svg>
