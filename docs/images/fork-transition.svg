<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-label="Forked transition diagram">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111; }
      .state { fill: #fff; stroke: #222; stroke-width: 2; }
      .fork { fill: #111; stroke: #111; }
      .line { fill: none; stroke: #222; stroke-width: 2; marker-end: url(#arrow); }
      .label { font-size: 16px; }
      .name { font-size: 18px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <ellipse class="state" cx="105" cy="130" rx="72" ry="48"/>
  <text class="name" x="105" y="130">START</text>
  <circle class="fork" cx="320" cy="130" r="7"/>
  <ellipse class="state" cx="565" cy="72" rx="82" ry="48"/>
  <text class="name" x="565" y="72">ERROR</text>
  <ellipse class="state" cx="565" cy="188" rx="92" ry="48"/>
  <text class="name" x="565" y="188">FINISHED</text>
  <path class="line" d="M 177 130 C 225 130 268 130 310 130"/>
  <path class="line" d="M 330 130 C 405 122 438 82 486 75"/>
  <path class="line" d="M 330 130 C 405 138 434 176 476 185"/>
  <text class="label" x="230" y="112">rdy</text>
  <text class="label" x="402" y="82">error</text>
  <text class="label" x="392" y="184">!error</text>
</svg>
