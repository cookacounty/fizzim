<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280" role="img" aria-label="Modern forked transition diagram">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef6f2"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2bb3a3"/>
      <stop offset="1" stop-color="#e0a72e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#24313d"/>
    </marker>
    <filter id="shadow" x="-20%" y="-35%" width="140%" height="170%">
      <feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#12202a" flood-opacity="0.18"/>
    </filter>
    <style>
      text { font-family: Inter, Segoe UI, Arial, Helvetica, sans-serif; fill: #17212b; }
      .bg { fill: #f4f7f9; }
      .state { fill: url(#card); stroke: #24313d; stroke-width: 2.4; filter: url(#shadow); }
      .fork { fill: #f4c542; stroke: #24313d; stroke-width: 2.2; filter: url(#shadow); }
      .line { fill: none; stroke: #24313d; stroke-width: 2.8; marker-end: url(#arrow); }
      .lineHot { fill: none; stroke: url(#wire); stroke-width: 4; marker-end: url(#arrow); }
      .name { font-size: 18px; font-weight: 800; text-anchor: middle; dominant-baseline: middle; }
      .label { font-size: 15px; font-weight: 800; }
      .caption { fill: #566575; font-size: 14px; font-weight: 600; }
    </style>
  </defs>

  <rect class="bg" width="760" height="280" rx="20"/>
  <text class="caption" x="38" y="42">One common condition, multiple branch destinations</text>

  <ellipse class="state" cx="120" cy="140" rx="78" ry="48"/>
  <text class="name" x="120" y="140">START</text>

  <circle class="fork" cx="340" cy="140" r="10"/>

  <ellipse class="state" cx="610" cy="82" rx="86" ry="46"/>
  <text class="name" x="610" y="82">ERROR</text>

  <ellipse class="state" cx="610" cy="198" rx="104" ry="46"/>
  <text class="name" x="610" y="198">FINISHED</text>

  <path class="lineHot" d="M 198 140 C 238 140 286 140 328 140"/>
  <path class="line" d="M 352 136 C 420 124 456 92 524 84"/>
  <path class="line" d="M 352 144 C 420 156 452 188 507 196"/>

  <text class="label" x="244" y="122">rdy</text>
  <text class="label" x="432" y="86">error</text>
  <text class="label" x="422" y="196">!error</text>
</svg>
